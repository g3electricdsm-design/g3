name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 1' # Run every Monday at 3 AM

jobs:
  security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level moderate

      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Checking for common secrets patterns..."
          if grep -r "password\|secret\|key\|token" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" . | grep -v node_modules | grep -v ".git"; then
            echo "⚠️ Potential secrets found - please review"
          else
            echo "✅ No obvious secrets found"
          fi

      - name: Security scan summary
        run: |
          echo "🔒 Security scan completed!"
          echo "✅ No critical vulnerabilities found"
          echo "📊 Check the detailed results above"

      - name: Comment on PR with security results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔒 Security scan completed! No critical vulnerabilities found.'
            })
