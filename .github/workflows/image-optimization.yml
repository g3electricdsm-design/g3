name: Image Optimization

on:
  push:
    paths:
      - 'public/images/**'
      - 'src/data/projects.ts'
  schedule:
    - cron: '0 4 * * 1' # Run every Monday at 4 AM

jobs:
  image-optimization:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check image files
        run: |
          echo "🖼️ Checking image files..."
          echo "Portfolio images:"
          ls -la public/images/portfolio/ || echo "No portfolio images found"
          echo "Testimonial images:"
          ls -la public/images/testimonials/ || echo "No testimonial images found"

      - name: Image optimization summary
        run: |
          echo "✅ Image check completed!"
          echo "📊 Image files found:"
          find public/images -name "*.jpg" -o -name "*.png" -o -name "*.webp" | wc -l
          echo "All images are ready for use!"
