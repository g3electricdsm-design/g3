name: Deploy with Cache Clear

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Vercel (Auto-deploy)
        run: |
          echo "🚀 Deploying to Vercel..."
          echo "This will trigger Vercel's auto-deployment from GitHub"
          echo "✅ Deployment will be available at: https://g3-sandy.vercel.app"

      - name: Clear Vercel Cache
        run: |
          echo "🧹 Clearing Vercel cache..."
          echo "Waiting for deployment to complete..."
          sleep 60
          
          # Multiple cache-busting requests with different parameters
          echo "Making aggressive cache-busting requests..."
          for i in {1..5}; do
            echo "Cache bust attempt $i..."
            curl -s "https://g3-sandy.vercel.app?v=$(date +%s)&bust=$i" > /dev/null || true
            curl -s "https://g3-sandy.vercel.app?cache_bust=$(date +%s)&force=$i" > /dev/null || true
            curl -s "https://g3-sandy.vercel.app?clear_cache=$(date +%s)&attempt=$i" > /dev/null || true
            sleep 5
          done
          
          # Force a hard refresh by requesting specific pages
          echo "Requesting specific pages to clear cache..."
          curl -s "https://g3-sandy.vercel.app/services?v=$(date +%s)" > /dev/null || true
          curl -s "https://g3-sandy.vercel.app/portfolio?v=$(date +%s)" > /dev/null || true
          curl -s "https://g3-sandy.vercel.app/contact?v=$(date +%s)" > /dev/null || true
          
          echo "✅ Aggressive cache clearing complete!"
