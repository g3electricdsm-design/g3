name: Deploy with Cache Clear

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Vercel (Auto-deploy)
        run: |
          echo "🚀 Deploying to Vercel..."
          echo "This will trigger Vercel's auto-deployment from GitHub"
          echo "✅ Deployment will be available at: https://g3-sandy.vercel.app"

      - name: Clear Vercel Cache
        run: |
          echo "🧹 Clearing Vercel cache..."
          echo "Waiting for deployment to complete..."
          sleep 30
          
          # Clear cache by making requests with cache-busting parameters
          echo "Making cache-busting requests..."
          curl -s "https://g3-sandy.vercel.app?v=$(date +%s)" > /dev/null || true
          curl -s "https://g3-sandy.vercel.app?cache_bust=$(date +%s)" > /dev/null || true
          
          echo "✅ Cache clearing complete!"
