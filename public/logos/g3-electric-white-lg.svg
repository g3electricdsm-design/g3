<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-30 -10 710 560"
     width="1024" height="807"
     fill="#F2F2F2">
  <defs>
    <filter id="round" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feComponentTransfer in="blur">
        <feFuncA type="discrete" tableValues="0 1"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <g filter="url(#round)">
    <text x="250" y="370"
          font-family="'Rockwell Extra Bold','Rockwell','Roboto Slab','Clarendon',Georgia,serif"
          font-weight="900"
          font-size="400"
          text-anchor="middle">G</text>
    <text x="480" y="195"
          font-family="'Rockwell Extra Bold','Rockwell','Roboto Slab','Clarendon',Georgia,serif"
          font-weight="900"
          font-size="200"
          text-anchor="middle">3</text>
    <text x="325" y="500"
          font-family="'Rockwell Extra Bold','Rockwell','Roboto Slab','Clarendon',Georgia,serif"
          font-weight="900"
          font-size="110"
          letter-spacing="10"
          text-anchor="middle">ELECTRIC</text>
  </g>
</svg>
